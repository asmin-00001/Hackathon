{% extends "base.html" %}

{% block title %}Login | TourGenie{% endblock %}

{% block content %}

<section class="planner">

    <div class="planner-container">

        <h1>Welcome Back 👋</h1>

        <p>Login to continue planning your next adventure.</p>

        <form action="/login" method="POST">

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

            </div>

            <button class="btn" type="submit">

                Login

            </button>

        </form>

        <br>

        <p>

            Don't have an account?

            <a href="{{ url_for('register') }}">

                Register Here

            </a>

        </p>

    </div>

</section>

{% endblock %}
